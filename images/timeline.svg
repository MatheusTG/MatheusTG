  <g transform="translate(1020,0)">
    <line x1="0" y1="628" x2="0" y2="689" stroke="#3b82f6" stroke-width="1.8" stroke-dasharray="5 6" opacity="0.45"/>
    <circle cx="0" cy="700" r="11" fill="#0b1424" stroke="url(#techShift)" stroke-width="2.4" filter="url(#softGlow)"/>

    <!-- icon: flask -->
    <circle cx="0" cy="190" r="55" fill="#0b1424" stroke="url(#techShift)" stroke-width="3" filter="url(#softGlow)"/>
    <g transform="translate(0,190)">
      <rect x="-13" y="-30" width="28" height="7" fill="url(#techShift)"/>
      <path d="M-12,-24 L-12,-4 L-29,24 L29,24 L12,-4 L12,-24 Z" fill="none" stroke="url(#techShift)" stroke-width="3.5" stroke-linejoin="round"/>
      <circle cx="-8" cy="12" r="2.8" fill="url(#techShift)" opacity="0.85"/>
      <circle cx="6" cy="8" r="2" fill="url(#techShift)" opacity="0.85"/>
      <circle cx="0" cy="17" r="1.7" fill="url(#techShift)" opacity="0.85"/>
    </g>

    <!-- year -->
    <text x="0" y="305" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="54" font-weight="700" fill="#3b82f6">2022</text>

    <!-- title -->
    <text x="0" y="363" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="#e2e8f0">
      <tspan x="0" dy="0">Undergraduate</tspan>
      <tspan x="0" dy="49">Research Fellow</tspan>
    </text>

    <!-- divider -->
    <line x1="-45" y1="450" x2="45" y2="450" stroke="url(#techShift)" stroke-width="3"/>

    <!-- description -->
    <text x="0" y="488" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="32" fill="#94a3b8">
      <tspan x="0" dy="0">Conducted research on</tspan>
      <tspan x="0" dy="42">Data Quality and Denial</tspan>
      <tspan x="0" dy="42">Constraints using Python</tspan>
