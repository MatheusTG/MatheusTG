    <circle cx="0" cy="700" r="11" fill="#0b1424" stroke="url(#techShift)" stroke-width="2.4" filter="url(#softGlow)"/>

    <!-- icon -->
    <circle cx="0" cy="190" r="55" fill="#0b1424" stroke="url(#techShift)" stroke-width="3" filter="url(#softGlow)"/>
    <text x="0" y="207" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="46" font-weight="700" fill="url(#techShift)">&lt;/&gt;</text>

    <!-- year -->
    <text x="0" y="305" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="54" font-weight="700" fill="#3b82f6">2021</text>

    <!-- title -->
    <text x="0" y="363" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="#e2e8f0">
      <tspan x="0" dy="0">Started</tspan>
      <tspan x="0" dy="49">Programming Journey</tspan>
    </text>

    <!-- divider -->
    <line x1="-45" y1="450" x2="45" y2="450" stroke="url(#techShift)" stroke-width="3"/>

    <!-- description -->
    <text x="0" y="488" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="32" fill="#94a3b8">
      <tspan x="0" dy="0">Started learning programming</tspan>
      <tspan x="0" dy="42">with Python and built my first</tspan>
      <tspan x="0" dy="42">applications using Django.</tspan>
    </text>
  </g>

  <!-- ============================================================ -->
  <!-- Milestone 2: 2022 - Technical High School @ UTFPR (BOTTOM) -->
  <!-- ============================================================ -->
  <g transform="translate(660,0)">
    <line x1="0" y1="711" x2="0" y2="767" stroke="#3b82f6" stroke-width="1.8" stroke-dasharray="5 6" opacity="0.45"/>
    <circle cx="0" cy="700" r="11" fill="#0b1424" stroke="url(#techShift)" stroke-width="2.4" filter="url(#softGlow)"/>

    <!-- year -->
    <text x="0" y="817" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="54" font-weight="700" fill="#3b82f6">2022</text>

    <!-- title -->
    <text x="0" y="875" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="#e2e8f0">
      <tspan x="0" dy="0">Technical High School</tspan>
      <tspan x="0" dy="49">@ UTFPR</tspan>
