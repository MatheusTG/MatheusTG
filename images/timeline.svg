      <rect x="-34" y="-14" width="67" height="41" rx="6" fill="none" stroke="url(#techShift)" stroke-width="3.5"/>
      <line x1="-34" y1="4" x2="34" y2="4" stroke="url(#techShift)" stroke-width="2" opacity="0.7"/>
