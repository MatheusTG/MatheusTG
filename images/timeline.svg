<svg width="1600" height="460" viewBox="0 0 1600 460" xmlns="http://www.w3.org/2000/svg" role="img">
<title>My Journey — Developer Timeline</title>
<desc>A horizontal timeline showing key milestones from 2021 to 2026.</desc>
<defs>

  <linearGradient id="techShift" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1600" y2="0" spreadMethod="repeat">
    <stop offset="0%"   stop-color="#22d3ee"/>
    <stop offset="33%"  stop-color="#3b82f6"/>
    <stop offset="66%"  stop-color="#6366f1"/>
    <stop offset="100%" stop-color="#22d3ee"/>
    <animateTransform attributeName="gradientTransform" type="translate" from="0 0" to="1600 0" dur="40s" repeatCount="indefinite"/>
  </linearGradient>

  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <filter id="glowStrong" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="6" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <filter id="particleGlow" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur stdDeviation="2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <filter id="nodeGlow" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.231  0 0 0 0 0.510  0 0 0 0 0.965  0 0 0 0.6 0" result="coloredBlur"/>
    <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <linearGradient id="circuitGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.05"/>
  </linearGradient>

</defs>

<!-- Grid pattern (subtle) -->
<g opacity="0.04" stroke="#3b82f6" stroke-width="0.5">
  <line x1="0" y1="100" x2="1600" y2="100"/>
  <line x1="0" y1="200" x2="1600" y2="200"/>
  <line x1="0" y1="300" x2="1600" y2="300"/>
  <line x1="0" y1="400" x2="1600" y2="400"/>
  <line x1="0" y1="500" x2="1600" y2="500"/>
  <line x1="0" y1="600" x2="1600" y2="600"/>
  <line x1="100" y1="0" x2="100" y2="630"/>
  <line x1="200" y1="0" x2="200" y2="630"/>
  <line x1="300" y1="0" x2="300" y2="630"/>
  <line x1="400" y1="0" x2="400" y2="630"/>
  <line x1="500" y1="0" x2="500" y2="630"/>
  <line x1="600" y1="0" x2="600" y2="630"/>
  <line x1="700" y1="0" x2="700" y2="630"/>
  <line x1="800" y1="0" x2="800" y2="630"/>
  <line x1="900" y1="0" x2="900" y2="630"/>
  <line x1="1000" y1="0" x2="1000" y2="630"/>
  <line x1="1100" y1="0" x2="1100" y2="630"/>
  <line x1="1200" y1="0" x2="1200" y2="630"/>
  <line x1="1300" y1="0" x2="1300" y2="630"/>
  <line x1="1400" y1="0" x2="1400" y2="630"/>
  <line x1="1500" y1="0" x2="1500" y2="630"/>
</g>

<!-- Decorative circuit lines — top-left -->
<g stroke="url(#circuitGrad)" stroke-width="1" fill="none" opacity="0.55">
  <path d="M 0 80 L 60 80 L 60 40 L 160 40"/>
  <path d="M 0 160 L 40 160 L 40 120 L 110 120"/>
  <path d="M 60 80 L 60 140 L 120 140"/>
  <circle cx="60"  cy="80"  r="3" fill="#3b82f6" opacity="0.6"/>
  <circle cx="60"  cy="40"  r="3" fill="#22d3ee" opacity="0.6"/>
  <circle cx="40"  cy="160" r="3" fill="#3b82f6" opacity="0.6"/>
  <circle cx="60"  cy="140" r="3" fill="#22d3ee" opacity="0.6"/>
</g>

<!-- Decorative circuit lines — bottom-right -->
<g stroke="url(#circuitGrad)" stroke-width="1" fill="none" opacity="0.55">
  <path d="M 1600 460 L 1540 460 L 1540 520 L 1440 520 L 1440 580 L 1320 580"/>
  <path d="M 1600 560 L 1555 560 L 1555 600 L 1490 600"/>
  <path d="M 1540 520 L 1540 480 L 1480 480"/>
  <circle cx="1540" cy="460" r="3" fill="#3b82f6" opacity="0.6"/>
  <circle cx="1540" cy="520" r="3" fill="#22d3ee" opacity="0.6"/>
  <circle cx="1440" cy="520" r="3" fill="#6366f1" opacity="0.6"/>
  <circle cx="1555" cy="560" r="3" fill="#3b82f6" opacity="0.6"/>
  <circle cx="1540" cy="480" r="3" fill="#22d3ee" opacity="0.6"/>
</g>

<!-- Floating particles -->
<g filter="url(#particleGlow)">
  <circle cx="120" cy="250" r="2" fill="#22d3ee" opacity="0.7">
    <animate attributeName="cy" values="250;230;250" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="80" r="1.5" fill="#3b82f6" opacity="0.6">
    <animate attributeName="cy" values="80;60;80" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="620" cy="560" r="2" fill="#6366f1" opacity="0.5">
    <animate attributeName="cy" values="560;540;560" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.15;0.5" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="50" r="2.5" fill="#22d3ee" opacity="0.6">
    <animate attributeName="cy" values="50;30;50" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1150" cy="590" r="1.5" fill="#3b82f6" opacity="0.5">
    <animate attributeName="cy" values="590;570;590" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1380" cy="90" r="2" fill="#6366f1" opacity="0.6">
    <animate attributeName="cy" values="90;70;90" dur="7.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="7.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1520" cy="340" r="2" fill="#22d3ee" opacity="0.5">
    <animate attributeName="cy" values="340;320;340" dur="6.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="6.5s" repeatCount="indefinite"/>
  </circle>
</g>

