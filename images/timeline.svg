    <g transform="translate(0,1240)">
      <polygon points="-36,-2 0,-19 36,-2 0,14" fill="url(#techShift)"/>
      <rect x="-19" y="6" width="38" height="12" rx="2" fill="url(#techShift)"/>
      <line x1="28" y1="-2" x2="34" y2="19" stroke="url(#techShift)" stroke-width="3"/>
      <circle cx="34" cy="22" r="3" fill="url(#techShift)"/>
    </g>
  </g>

  <!-- ============================================================ -->
  <!-- Milestone 3: 2022 - Undergraduate Research Fellow (TOP) -->
