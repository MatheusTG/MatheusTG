<svg width="2400" height="1400" viewBox="0 0 2400 1400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Animated tech gradient -->
    <linearGradient id="techShift"
                    gradientUnits="userSpaceOnUse"
                    x1="0" y1="0"
                    x2="400" y2="0"
                    spreadMethod="repeat">
      <stop offset="0%" stop-color="#4f7cff"/>
      <stop offset="45%" stop-color="#3b82ff"/>
      <stop offset="80%" stop-color="#5b5fff"/>
      <stop offset="100%" stop-color="#4f7cff"/>

      <animateTransform
          attributeName="gradientTransform"
          type="translate"
          from="0 0"
          to="400 0"
          dur="40s"
          repeatCount="indefinite"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="particleGlow">
      <stop offset="0%" stop-color="#5ea0ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5ea0ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Static gradient for the main timeline line -->
    <linearGradient id="lineGrad">
      <stop offset="0%" stop-color="#335dff"/>
      <stop offset="50%" stop-color="#4f7cff"/>
      <stop offset="100%" stop-color="#5b5fff"/>
    </linearGradient>
  </defs>

  <!-- Faint grid pattern -->
  <g stroke="#3b82f6" stroke-width="1" opacity="0.08">
    <g>
      <line x1="120" y1="0" x2="120" y2="1400"/>
      <line x1="360" y1="0" x2="360" y2="1400"/>
      <line x1="600" y1="0" x2="600" y2="1400"/>
      <line x1="840" y1="0" x2="840" y2="1400"/>
      <line x1="1080" y1="0" x2="1080" y2="1400"/>
      <line x1="1320" y1="0" x2="1320" y2="1400"/>
      <line x1="1560" y1="0" x2="1560" y2="1400"/>
      <line x1="1800" y1="0" x2="1800" y2="1400"/>
      <line x1="2040" y1="0" x2="2040" y2="1400"/>
      <line x1="2280" y1="0" x2="2280" y2="1400"/>
    </g>
    <g>
      <line x1="0" y1="132" x2="2400" y2="132"/>
      <line x1="0" y1="335" x2="2400" y2="335"/>
      <line x1="0" y1="537" x2="2400" y2="537"/>
      <line x1="0" y1="739" x2="2400" y2="739"/>
      <line x1="0" y1="941" x2="2400" y2="941"/>
      <line x1="0" y1="1143" x2="2400" y2="1143"/>
      <line x1="0" y1="1330" x2="2400" y2="1330"/>
    </g>
  </g>

  <!-- Decorative circuit lines: top-right corner -->
  <g fill="none" stroke="url(#techShift)" stroke-width="1.8" opacity="0.3" stroke-linecap="round">
    <path d="M2400,62 L2280,62 L2280,140 L2196,140 L2196,218"/>
    <path d="M2400,218 L2352,218 L2352,311 L2256,311"/>
    <path d="M2400,405 L2328,405 L2328,327"/>
    <circle cx="2196" cy="218" r="5" fill="#22d3ee"/>
    <circle cx="2256" cy="311" r="5" fill="#3b82f6"/>
    <circle cx="2328" cy="327" r="5" fill="#6366f1"/>
    <circle cx="2280" cy="140" r="4" fill="#22d3ee"/>
  </g>

  <!-- Decorative circuit lines: bottom-left corner -->
  <g fill="none" stroke="url(#techShift)" stroke-width="1.8" opacity="0.3" stroke-linecap="round">
    <path d="M0,1338 L72,1338 L72,1261 L168,1261 L168,1183"/>
    <path d="M0,1198 L48,1198 L48,1105 L144,1105"/>
    <path d="M0,1400 L120,1400 L120,1307"/>
    <circle cx="168" cy="1183" r="5" fill="#22d3ee"/>
    <circle cx="144" cy="1105" r="5" fill="#3b82f6"/>
    <circle cx="120" cy="1307" r="5" fill="#6366f1"/>
    <circle cx="72" cy="1261" r="4" fill="#22d3ee"/>
  </g>

  <!-- Floating particles -->
  <g>
    <circle cx="180" cy="249" r="3.5" fill="url(#particleGlow)">
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="249;220;249" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="480" cy="1151" r="3" fill="url(#particleGlow)">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="1151;1120;1151" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="840" cy="202" r="4" fill="url(#particleGlow)">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="202;172;202" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1272" cy="1252" r="3.5" fill="url(#particleGlow)">
      <animate attributeName="opacity" values="0.25;0.85;0.25" dur="6.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="1252;1222;1252" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1620" cy="265" r="3" fill="url(#particleGlow)">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="5.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="265;295;265" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1944" cy="1151" r="4" fill="url(#particleGlow)">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="1151;1181;1151" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="2220" cy="708" r="3" fill="url(#particleGlow)">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="2220;2188;2220" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="90" cy="708" r="3" fill="url(#particleGlow)">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="90;122;90" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1170" cy="708" r="3.5" fill="url(#particleGlow)">
      <animate attributeName="opacity" values="0.25;0.75;0.25" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="708;686;708" dur="7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Main timeline line -->
  <g>
    <line x1="120" y1="700" x2="2280" y2="700" stroke="#3b82f6" stroke-width="22" stroke-linecap="round" opacity="0.10"/>
    <line x1="120" y1="700" x2="2280" y2="700" stroke="#3b82f6" stroke-width="12" stroke-linecap="round" opacity="0.18"/>
    <line x1="120" y1="700" x2="2280" y2="700" stroke="url(#lineGrad)" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- ============================================================ -->
  <!-- Milestone 1: 2021 - Started Programming Journey (TOP) -->
  <!-- ============================================================ -->
